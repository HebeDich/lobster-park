    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EnvelopeError'
    RedirectResponse:
      description: Temporary redirect
      headers:
        Location:
          schema:
            type: string
            format: uri
        Set-Cookie:
          schema:
            type: string
          description: Present on callback success
  headers:
    RetryAfter:
      description: Seconds until the client may retry
      schema:
        type: integer
