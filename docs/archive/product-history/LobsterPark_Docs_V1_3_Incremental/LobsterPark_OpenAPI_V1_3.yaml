  /api/v1/instances/{instanceId}/skills/{skillId}:disable:
    post:
      summary: Disable skill on instance
      operationId: disableSkill
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/SkillId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeBase'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/catalog/templates:
    get:
      summary: List built-in templates
      operationId: listTemplates
      parameters:
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedTemplates'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/platform/templates:
    post:
      summary: Create platform template (V1.5)
      operationId: createPlatformTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Template'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeBase'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/sso/authorize:
    get:
      summary: Initiate OIDC SSO authorization
      operationId: authorizeSso
      parameters:
      - in: query
        name: redirect_uri
        required: false
        schema:
          type: string
        description: Frontend redirect target after successful login
      responses:
        '302':
          description: Temporary redirect
          headers:
            Location:
              schema:
                type: string
                format: uri
            Set-Cookie:
              schema:
                type: string
              description: Present on callback success
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/sso/callback:
    get:
      summary: OIDC authorization callback
      operationId: handleSsoCallback
      parameters:
      - in: query
        name: code
        required: true
        schema:
          type: string
      - in: query
        name: state
        required: true
        schema:
          type: string
      responses:
        '302':
          description: Temporary redirect
          headers:
            Location:
              schema:
                type: string
                format: uri
            Set-Cookie:
              schema:
                type: string
              description: Present on callback success
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/tenants/{tenantId}:
    patch:
      summary: Patch tenant metadata and quota
      operationId: patchTenant
      parameters:
      - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTenantRequest'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeBase'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/ws/ticket:
    post:
      summary: Issue one-time WebSocket ticket
      operationId: issueWsTicket
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeWsTicket'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/platform/settings:
    get:
      summary: List platform settings
      operationId: listPlatformSettings
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedPlatformSettings'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/platform/settings/{settingKey}:
    get:
      summary: Get platform setting
      operationId: getPlatformSetting
      parameters:
      - $ref: '#/components/parameters/SettingKey'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePlatformSetting'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    put:
      summary: Update platform setting
      operationId: putPlatformSetting
      parameters:
      - $ref: '#/components/parameters/SettingKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - settingValueJson
              properties:
                settingValueJson:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePlatformSetting'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/platform/schemas/{runtimeVersion}:
    get:
      summary: Get JSON schema for a runtime version
      operationId: getRuntimeSchema
      parameters:
      - $ref: '#/components/parameters/RuntimeVersion'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '429':
          $ref: '#/components/responses/TooManyRequests'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: lp_access
  parameters:
    PageNo:
      in: query
      name: pageNo
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      in: header
      name: X-Idempotency-Key
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    InstanceId:
      in: path
      name: instanceId
      required: true
      schema:
        type: string
    VersionId:
      in: path
      name: versionId
      required: true
      schema:
        type: string
    AlertId:
      in: path
      name: alertId
      required: true
      schema:
        type: string
    JobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
    RequestId:
      in: path
      name: requestId
      required: true
      schema:
        type: string
    TenantId:
      in: path
      name: tenantId
      required: true
      schema:
        type: string
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: string
    NodeId:
      in: path
      name: nodeId
      required: true
      schema:
        type: string
    NotificationId:
      in: path
      name: notificationId
      required: true
      schema:
        type: string
    SkillId:
      in: path
      name: skillId
      required: true
      schema:
        type: string
    SettingKey:
      in: path
      name: settingKey
      required: true
      schema:
        type: string
      description: Platform setting key
    RuntimeVersion:
      in: path
      name: runtimeVersion
      required: true
      schema:
        type: string
      description: Approved OpenClaw runtime version
  schemas:
    EnvelopeBase:
      type: object
      properties:
        requestId:
          type: string
        code:
          type: integer
        message:
          type: string
    PagedMeta:
      type: object
      properties:
        pageNo:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    InstanceLifecycleStatus:
      type: string
      enum:
      - draft
      - creating
      - create_failed
      - stopped
      - starting
      - running
      - unhealthy
      - updating
      - deleting
      - deleted
    ConfigVersionStatus:
      type: string
      enum:
      - draft
      - validating
      - validate_failed
      - ready_to_publish
      - publishing
      - publish_failed
      - active
      - rolled_back
      - archived
    PairingStatus:
      type: string
      enum:
      - pending
      - approved
      - rejected
      - expired
    NodeOnlineStatus:
      type: string
      enum:
      - online
      - offline
      - error
      - detached
    AlertStatus:
      type: string
      enum:
      - open
      - acked
      - resolved
      - suppressed
    AlertSeverity:
      type: string
      enum:
      - P1
      - P2
      - P3
      - P4
    CurrentUser:
      type: object
      properties:
        userId:
          type: string
        tenantId:
          type: string
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        email:
          type: string
          format: email
    Instance:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        ownerUserId:
          type: string
        name:
          type: string
        specCode:
          type: string
          enum:
          - S
          - M
          - L
        runtimeVersion:
          type: string
        lifecycleStatus:
          $ref: '#/components/schemas/InstanceLifecycleStatus'
        healthStatus:
          type: string
        currentActiveVersionId:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        nodeCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateInstanceRequest:
      type: object
      required:
      - name
      - specCode
      properties:
        name:
          type: string
          maxLength: 64
        description:
          type: string
          maxLength: 500
        specCode:
          type: string
          enum:
          - S
          - M
          - L
        templateId:
          type: string
          nullable: true
        runtimeVersion:
          type: string
          nullable: true
        autoStart:
          type: boolean
          default: false
    JobAccepted:
      type: object
      properties:
        jobId:
          type: string
        instanceId:
          type: string
    Job:
      type: object
      properties:
        id:
          type: string
        jobType:
          type: string
        jobStatus:
          type: string
          enum:
          - pending
          - running
          - success
          - failed
          - cancelled
          - dead_letter
        progress:
          type: integer
          minimum: 0
          maximum: 100
        errorCode:
          type: integer
          nullable: true
        errorMessage:
          type: string
          nullable: true
        requestId:
          type: string
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
    ConfigDraft:
      type: object
      properties:
        instanceId:
          type: string
        schemaVersion:
          type: string
        dirtyFlag:
          type: boolean
        draftJson:
          type: object
          additionalProperties: true
    SaveConfigDraftRequest:
      type: object
      required:
      - draftJson
      properties:
        draftJson:
          type: object
          additionalProperties: true
    ConfigVersion:
      type: object
      properties:
        id:
          type: string
        versionNo:
          type: integer
        versionStatus:
          $ref: '#/components/schemas/ConfigVersionStatus'
        createdAt:
          type: string
          format: date-time
        activatedAt:
          type: string
          format: date-time
          nullable: true
        publishNote:
          type: string
          nullable: true
        createdBy:
          type: string
        sourceType:
          type: string
          enum:
          - publish
          - rollback
          - force_publish
        normalizedConfigJson:
          type: object
          additionalProperties: true
        validationErrorsJson:
          type: array
          items:
            type: object
            additionalProperties: true
    Node:
      type: object
      properties:
        id:
          type: string
        pairingStatus:
          $ref: '#/components/schemas/PairingStatus'
        onlineStatus:
          $ref: '#/components/schemas/NodeOnlineStatus'
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
        tenantId:
          type: string
        boundInstanceId:
          type: string
          nullable: true
        metadataJson:
          type: object
          additionalProperties: true
        capabilitiesJson:
          type: array
          items:
            type: string
    PairingRequest:
      type: object
      properties:
        id:
          type: string
        instanceId:
          type: string
        pairingStatus:
          $ref: '#/components/schemas/PairingStatus'
        requestedAt:
          type: string
          format: date-time
        tenantId:
          type: string
        nodeFingerprint:
          type: string
        reviewedBy:
          type: string
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          nullable: true
    Health:
      type: object
      properties:
        runtimeStatus:
          type: string
        healthStatus:
          type: string
        lastCheckedAt:
          type: string
          format: date-time
        channels:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
        models:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
    Usage:
      type: object
      properties:
        requests:
          type: integer
        activeSessions:
          type: integer
        tokenInput:
          type: integer
          nullable: true
        tokenOutput:
          type: integer
          nullable: true
        estimatedCost:
          type: number
          nullable: true
    Alert:
      type: object
      properties:
        id:
          type: string
        instanceId:
          type: string
          nullable: true
        alertType:
          type: string
        severity:
          $ref: '#/components/schemas/AlertSeverity'
        status:
          $ref: '#/components/schemas/AlertStatus'
        title:
          type: string
        firstTriggeredAt:
          type: string
          format: date-time
        lastTriggeredAt:
          type: string
          format: date-time
        tenantId:
          type: string
        dedupeKey:
          type: string
        detailJson:
          type: object
          additionalProperties: true
        ackedBy:
          type: string
          nullable: true
        ackedAt:
          type: string
          format: date-time
          nullable: true
        resolvedBy:
          type: string
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true
    Audit:
      type: object
      properties:
        id:
          type: string
        actionType:
          type: string
        actionResult:
          type: string
        operatorUserId:
          type: string
        targetType:
          type: string
        targetId:
          type: string
        createdAt:
          type: string
          format: date-time
        tenantId:
          type: string
        summary:
          type: string
          nullable: true
        traceId:
          type: string
        riskLevel:
          type: string
        beforeJson:
          type: object
          additionalProperties: true
        afterJson:
          type: object
          additionalProperties: true
        metadataJson:
          type: object
          additionalProperties: true
    EnvelopeCurrentUser:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            $ref: '#/components/schemas/CurrentUser'
    EnvelopeInstance:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            $ref: '#/components/schemas/Instance'
    EnvelopePagedInstances:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            allOf:
            - $ref: '#/components/schemas/PagedMeta'
            - type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/Instance'
    EnvelopeJobAccepted:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            $ref: '#/components/schemas/JobAccepted'
    EnvelopeJob:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            $ref: '#/components/schemas/Job'
    EnvelopeConfigDraft:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            $ref: '#/components/schemas/ConfigDraft'
    EnvelopePagedConfigVersions:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            allOf:
            - $ref: '#/components/schemas/PagedMeta'
            - type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/ConfigVersion'
    EnvelopePagedNodes:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            allOf:
            - $ref: '#/components/schemas/PagedMeta'
            - type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/Node'
    EnvelopePagedPairingRequests:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            allOf:
            - $ref: '#/components/schemas/PagedMeta'
            - type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/PairingRequest'
    EnvelopePairingRequest:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            $ref: '#/components/schemas/PairingRequest'
    EnvelopeHealth:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            $ref: '#/components/schemas/Health'
    EnvelopeUsage:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            $ref: '#/components/schemas/Usage'
    EnvelopePagedAlerts:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            allOf:
            - $ref: '#/components/schemas/PagedMeta'
            - type: object
              properties:
                items:
                  type: array
