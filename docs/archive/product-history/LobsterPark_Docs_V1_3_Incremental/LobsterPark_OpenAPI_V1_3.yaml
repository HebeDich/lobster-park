        tenantId:
          type: string
        totalInstances:
          type: integer
        runningInstances:
          type: integer
        unhealthyInstances:
          type: integer
        offlineNodes:
          type: integer
        openAlerts:
          type: integer
        generatedAt:
          type: string
          format: date-time
    SkillPackage:
