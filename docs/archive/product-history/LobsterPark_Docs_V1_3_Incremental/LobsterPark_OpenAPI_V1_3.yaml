openapi: 3.1.0
info:
  title: Lobster Park API
  version: 1.3.0
  description: OpenAPI draft aligned with Lobster Park Phase 0 architecture decisions
    V1.3
servers:
- url: https://lobster-park.internal
security:
- cookieAuth: []
paths:
  /api/v1/me:
    get:
      summary: Get current user context
      operationId: getCurrentUser
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeCurrentUser'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances:
    get:
      summary: List instances
      operationId: listInstances
      parameters:
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      - in: query
        name: keyword
        schema:
          type: string
      - in: query
        name: lifecycleStatus
        schema:
          $ref: '#/components/schemas/InstanceLifecycleStatus'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedInstances'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      summary: Create instance
      operationId: createInstance
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstanceRequest'
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobAccepted'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}:
    get:
      summary: Get instance detail
      operationId: getInstance
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeInstance'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      summary: Delete instance
      operationId: deleteInstance
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - confirmText
              properties:
                confirmText:
                  type: string
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobAccepted'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      summary: Update instance metadata
      operationId: patchInstance
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchInstanceRequest'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeInstance'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/start:
    post:
      summary: Start instance
      operationId: startInstance
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobAccepted'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/stop:
    post:
      summary: Stop instance
      operationId: stopInstance
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobAccepted'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/restart:
    post:
      summary: Restart instance
      operationId: restartInstance
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobAccepted'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/config/draft:
    get:
      summary: Get config draft
      operationId: getConfigDraft
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeConfigDraft'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    put:
      summary: Save config draft
      operationId: saveConfigDraft
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveConfigDraftRequest'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeConfigDraft'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/config/validate:
    post:
      summary: Validate config
      operationId: validateConfig
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobAccepted'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/config/publish:
    post:
      summary: Publish config
      operationId: publishConfig
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  maxLength: 500
                forcePublish:
                  type: boolean
                  default: false
                confirmText:
                  type: string
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobAccepted'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      description: When forcePublish=true, caller must have config.force_publish permission
        (break-glass). Action is audited and triggers a P2 alert.
  /api/v1/instances/{instanceId}/config/versions:
    get:
      summary: List config versions
      operationId: listConfigVersions
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedConfigVersions'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/config/versions/{versionId}/rollback:
    post:
      summary: Rollback config version
      operationId: rollbackConfigVersion
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/VersionId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - confirmText
              properties:
                confirmText:
                  type: string
                note:
                  type: string
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobAccepted'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/nodes:
    get:
      summary: List instance nodes
      operationId: listInstanceNodes
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedNodes'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/nodes/pairing-requests:
    get:
      summary: List pairing requests
      operationId: listPairingRequests
      parameters:
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedPairingRequests'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/nodes/pairing-requests/{requestId}/approve:
    post:
      summary: Approve pairing request
      operationId: approvePairingRequest
      parameters:
      - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePairingRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/nodes/pairing-requests/{requestId}/reject:
    post:
      summary: Reject pairing request
      operationId: rejectPairingRequest
      parameters:
      - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePairingRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/health:
    get:
      summary: Get instance health
      operationId: getInstanceHealth
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeHealth'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/usage:
    get:
      summary: Get instance usage
      operationId: getInstanceUsage
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - in: query
        name: from
        schema:
          type: string
          format: date-time
      - in: query
        name: to
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUsage'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/alerts:
    get:
      summary: List alerts
      operationId: listAlerts
      parameters:
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      - in: query
        name: status
        schema:
          $ref: '#/components/schemas/AlertStatus'
      - in: query
        name: severity
        schema:
          $ref: '#/components/schemas/AlertSeverity'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedAlerts'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/alerts/{alertId}/ack:
    patch:
      summary: Acknowledge alert
      operationId: ackAlert
      parameters:
      - $ref: '#/components/parameters/AlertId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAlert'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/alerts/{alertId}/resolve:
    patch:
      summary: Resolve alert
      operationId: resolveAlert
      parameters:
      - $ref: '#/components/parameters/AlertId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAlert'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/audits:
    get:
      summary: List audit logs
      operationId: listAudits
      parameters:
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      - in: query
        name: tenantId
        schema:
          type: string
      - in: query
        name: instanceId
        schema:
          type: string
      - in: query
        name: actionType
        schema:
          type: string
      - in: query
        name: operatorId
        schema:
          type: string
      - in: query
        name: actionResult
        schema:
          type: string
          enum:
          - success
          - failed
      - in: query
        name: startTime
        schema:
          type: string
          format: date-time
      - in: query
        name: endTime
        schema:
          type: string
          format: date-time
      - in: query
        name: riskLevel
        schema:
          type: string
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedAudits'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/jobs/{jobId}:
    get:
      summary: Get job detail
      operationId: getJob
      parameters:
      - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJob'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /health:
    get:
      summary: Liveness probe
      operationId: getHealth
      responses:
        '200':
          description: ok
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /ready:
    get:
      summary: Readiness probe
      operationId: getReady
      responses:
        '200':
          description: ok
        '503':
          description: not ready
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /metrics:
    get:
      summary: Prometheus metrics
      operationId: getMetrics
      responses:
        '200':
          description: ok
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /info:
    get:
      summary: Build info
      operationId: getInfo
      responses:
        '200':
          description: ok
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/refresh:
    post:
      summary: Refresh session
      operationId: refreshSession
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeCurrentUser'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/logout:
    post:
      summary: Logout current session
      operationId: logoutSession
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeBase'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/tenants:
    get:
      summary: List tenants
      operationId: listTenants
      parameters:
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedTenants'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      summary: Create tenant
      operationId: createTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeBase'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/tenants/{tenantId}/users:
    get:
      summary: List tenant users
      operationId: listTenantUsers
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedUsers'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      summary: Create tenant user
      operationId: createTenantUser
      parameters:
      - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantUserRequest'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/tenants/{tenantId}/users/{userId}:
    patch:
      summary: Patch tenant user
      operationId: patchTenantUser
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTenantUserRequest'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/roles:
    get:
      summary: List roles
      operationId: listRoles
      parameters:
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedRoles'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/users/{userId}/roles:
    patch:
      summary: Assign user roles
      operationId: assignUserRoles
      parameters:
      - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignUserRolesRequest'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/restore:
    post:
      summary: Restore soft deleted instance
      operationId: restoreInstance
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeJobAccepted'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/config/current:
    get:
      summary: Get current active config
      operationId: getCurrentConfig
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeConfigCurrent'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      description: Used together with config/draft or version detail for client-side
        diff rendering in V1.
  /api/v1/instances/{instanceId}/config/versions/{versionId}:
    get:
      summary: Get config version detail
      operationId: getConfigVersionDetail
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeConfigVersion'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/nodes/{nodeId}/detach:
    post:
      summary: Detach node from instance
      operationId: detachNode
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/NodeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - confirmText
              properties:
                confirmText:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePairingRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/monitor/overview:
    get:
      summary: Get monitor overview
      operationId: getMonitorOverview
      parameters:
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMonitorOverview'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/alerts/{alertId}:
    get:
      summary: Get alert detail
      operationId: getAlert
      parameters:
      - $ref: '#/components/parameters/AlertId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAlert'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/notifications:
    get:
      summary: List current user notifications
      operationId: listNotifications
      parameters:
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedNotifications'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/notifications/unread-count:
    get:
      summary: Get current user unread notification count
      operationId: getUnreadNotificationCount
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUnreadCount'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/notifications/{notificationId}/read:
    patch:
      summary: Mark notification as read
      operationId: markNotificationRead
      parameters:
      - $ref: '#/components/parameters/NotificationId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeNotificationReadResult'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/notifications/read-all:
    patch:
      summary: Mark all notifications as read
      operationId: markAllNotificationsRead
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeBulkReadResult'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/jobs/{jobId}/cancel:
    post:
      summary: Cancel job
      operationId: cancelJob
      parameters:
      - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeCancelJobResult'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/catalog/skills:
    get:
      summary: List skill packages visible to current tenant
      operationId: listSkillPackages
      parameters:
      - $ref: '#/components/parameters/PageNo'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopePagedSkillPackages'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/instances/{instanceId}/skills/{skillId}:enable:
    post:
      summary: Enable skill on instance
      operationId: enableSkill
      parameters:
      - $ref: '#/components/parameters/InstanceId'
      - $ref: '#/components/parameters/SkillId'
      responses:
        '200':
          description: ok
          content:
            application/json:
