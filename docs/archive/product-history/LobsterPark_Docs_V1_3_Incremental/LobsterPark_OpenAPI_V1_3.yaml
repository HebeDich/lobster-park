          - in_app
          - email
        recipientUserId:
          type: string
          nullable: true
        recipient:
          type: string
        title:
          type: string
        contentJson:
          type: object
          additionalProperties: true
        sendStatus:
          type: string
        retryCount:
          type: integer
        lastError:
          type: string
          nullable: true
        readAt:
          type: string
          format: date-time
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
    UnreadCount:
