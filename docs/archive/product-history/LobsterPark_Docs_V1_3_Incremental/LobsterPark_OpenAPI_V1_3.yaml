                    $ref: '#/components/schemas/Alert'
    EnvelopeAlert:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            $ref: '#/components/schemas/Alert'
    EnvelopePagedAudits:
      allOf:
      - $ref: '#/components/schemas/EnvelopeBase'
      - type: object
        properties:
          data:
            allOf:
            - $ref: '#/components/schemas/PagedMeta'
            - type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/Audit'
    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    User:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
        roles:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Role:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
    Notification:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        alertId:
          type: string
          nullable: true
        eventType:
          type: string
        channelType:
          type: string
