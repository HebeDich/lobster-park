          maxLength: 512
          pattern: '^/(?!/).{0,511}$'
        description: Same-origin relative path only, e.g. /workbench. Absolute URLs are rejected and fall back to /workbench.
      responses:
        '302':
          description: Temporary redirect
          headers:
            Location:
              schema:
                type: string
                format: uri
            Set-Cookie:
              schema:
                type: string
              description: Present on callback success
        '429':
          $ref: '#/components/responses/TooManyRequests'
