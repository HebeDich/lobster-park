    # ── V1.4 NEW: Secrets schemas ─────────────────────────────────
    SecretListItem:
      type: object
      description: '[V1.4] Masked secret item — cipher_value is never exposed'
      properties:
        id:
          type: string
          description: ULID with sec_ prefix
        secretKey:
          type: string
          description: Unique key within instance, e.g. "openai_api_key"
        maskedPreview:
          type: string
          description: Masked preview, e.g. "sk-****7890"
        secretVersion:
          type: integer
          description: Incremented on each value update
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration time for credential rotation tracking
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateSecretRequest:
      type: object
      description: '[V1.4] Create a new secret for an instance'
      additionalProperties: false
      required:
      - secretKey
      - secretValue
      properties:
        secretKey:
          type: string
          pattern: '^[a-z0-9_]+$'
          maxLength: 64
          description: Unique identifier within the instance
        secretValue:
          type: string
          maxLength: 4096
          description: Plain-text secret value (encrypted at rest, never returned)
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration timestamp
    UpdateSecretRequest:
      type: object
      description: '[V1.4] Update secret value and/or expiration'
      additionalProperties: false
      minProperties: 1
      properties:
        secretValue:
          type: string
          maxLength: 4096
          description: New plain-text value (omit to keep current value)
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: New expiration (explicit null clears expiration)
    DeleteSecretRequest:
      type: object
      description: '[V1.4] Confirm secret deletion'
      additionalProperties: false
      required:
      - confirmText
      properties:
        confirmText:
          type: string
          enum:
          - DELETE
          description: Must be DELETE to confirm
