<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>OpenClaw Browser Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: #333; background: #fff; }
    .header { padding: 14px 16px; background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; display: flex; align-items: center; gap: 10px; }
    .header-icon { font-size: 22px; }
    .header-title { font-size: 15px; font-weight: 600; }
    .header-sub { font-size: 11px; opacity: 0.85; margin-top: 2px; }
    .status-bar { padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.connected { background: #27ae60; box-shadow: 0 0 4px #27ae60; }
    .status-dot.connecting { background: #f39c12; animation: pulse 1s infinite; }
    .status-dot.disconnected { background: #bdc3c7; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { flex: 1; font-size: 12px; }
    .status-text .label { color: #999; }
    .form { padding: 14px 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
    .form-group input { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: #e74c3c; }
    .form-group .hint { font-size: 11px; color: #999; margin-top: 3px; }
    .actions { padding: 0 16px 14px; display: flex; gap: 8px; }
    .btn { flex: 1; padding: 8px 0; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #e74c3c; color: #fff; }
    .btn-primary:hover { background: #c0392b; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #f5f5f5; color: #666; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #eee; }
    .footer { padding: 8px 16px; border-top: 1px solid #eee; text-align: center; font-size: 11px; color: #bbb; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">�</div>
    <div>
      <div class="header-title">OpenClaw Browser Bridge</div>
      <div class="header-sub">OpenClaw 浏览器桥接</div>
    </div>
  </div>

  <div class="status-bar">
    <div id="statusDot" class="status-dot disconnected"></div>
    <div class="status-text">
      <span class="label">状态：</span><span id="statusLabel">未连接</span>
    </div>
  </div>

  <div class="form">
    <div class="form-group">
      <label>平台地址</label>
      <input type="text" id="serverUrl" placeholder="https://your-domain.com" />
      <div class="hint">OpenClaw 平台的访问地址（下载时已自动填充）</div>
    </div>
    <div class="form-group">
      <label>桥接令牌</label>
      <input type="password" id="authToken" placeholder="从平台生成的桥接令牌" />
      <div class="hint">在实例详情页 → 高级功能 → 生成桥接令牌</div>
    </div>
  </div>

  <div class="actions">
    <button id="btnConnect" class="btn btn-primary">连接</button>
    <button id="btnDisconnect" class="btn btn-secondary" style="display:none;">断开</button>
  </div>

  <div class="footer">v1.0.0 · Claw World</div>

  <script src="popup.js"></script>
</body>
</html>
